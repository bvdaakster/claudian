font_family      JetBrains Mono
font_size        13.0
# HiDPI: scale factor  set to 2.0 for 4K displays
# kitty reads DISPLAY DPI automatically on X11, this is fallback
# force_ltr yes

# Appearance
background_opacity 0.97
window_padding_width 8

# Performance
sync_to_monitor yes

# Shell
shell /bin/bash
